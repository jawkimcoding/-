<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프리미엄 로또 생성기</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-texture"></div>
  <main class="container">
    <header>
      <h1>LOTTO GENERATOR</h1>
      <p class="subtitle">오늘의 행운을 잡으세요!</p>
    </header>

    <section id="lotto-display" class="ball-container">
      <div class="placeholder">번호 생성 버튼을 눌러주세요</div>
    </section>

    <div class="action-section">
      <button id="generate-btn" class="generate-button">
        <span class="btn-text">행운의 번호 생성하기</span>
        <div class="btn-glow"></div>
      </button>
    </div>

    <section class="history-section">
      <h2>최근 생성 내역</h2>
      <ul id="history-list" class="history-list">
        <!-- 히스토리가 여기에 추가됩니다 -->
      </ul>
      <button id="clear-history" class="clear-btn">내역 삭제</button>
    </section>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>

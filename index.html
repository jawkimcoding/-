<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프리미엄 로또 생성기</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-texture"></div>
  <main class="container">
    <header>
      <div class="header-top">
        <h1>LOTTO GENERATOR</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <p class="subtitle">오늘의 행운을 잡으세요!</p>
    </header>

    <section id="lotto-display" class="ball-container">
      <div class="placeholder">번호 생성 버튼을 눌러주세요</div>
    </section>

    <div class="action-section">
      <button id="generate-btn" class="generate-button">
        <span class="btn-text">행운의 번호 생성하기</span>
        <div class="btn-glow"></div>
      </button>
    </div>

    <section class="history-section">
      <h2>최근 생성 내역</h2>
      <ul id="history-list" class="history-list">
        <!-- 히스토리가 여기에 추가됩니다 -->
      </ul>
      <button id="clear-history" class="clear-btn">내역 삭제</button>
    </section>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
